services:
  neo4j:
    image: neo4j:5.26-community
    container_name: medigraph-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./artifacts/graph/import_csv:/import
      - neo4j_plugins:/plugins
      
    healthcheck:
      test: "cypher-shell -a bolt://localhost:7687 -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  
